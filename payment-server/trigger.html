<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TVS Photobooth - Unlock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111; color: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 30px; opacity: 0.8; }
  #btn {
    width: 220px; height: 220px; border-radius: 50%;
    border: none; cursor: pointer;
    background: #22c55e; color: #fff;
    font-size: 1.5rem; font-weight: 700;
    box-shadow: 0 0 40px rgba(34,197,94,0.4);
    transition: transform 0.1s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #btn:active { transform: scale(0.95); }
  #btn.success { background: #16a34a; }
  #btn.error { background: #dc2626; box-shadow: 0 0 40px rgba(220,38,38,0.4); }
  #btn.sending { background: #666; pointer-events: none; }
  #status { margin-top: 24px; font-size: 1rem; opacity: 0.7; min-height: 1.5em; }
</style>
</head>
<body>
  <h1>TVS Photobooth</h1>
  <button id="btn" onclick="unlock()">UNLOCK<br>PHOTO</button>
  <div id="status"></div>
<script>
  const API = `http://${location.hostname}:8080/unlock`;
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');

  async function unlock() {
    btn.className = 'sending';
    btn.textContent = '...';
    status.textContent = '';
    try {
      const res = await fetch(API, { method: 'POST' });
      const data = await res.json();
      btn.className = 'success';
      btn.innerHTML = 'UNLOCK<br>PHOTO';
      status.textContent = `Credits: ${data.credits}`;
      setTimeout(() => { btn.className = ''; }, 1500);
    } catch (e) {
      btn.className = 'error';
      btn.innerHTML = 'UNLOCK<br>PHOTO';
      status.textContent = 'Connection error';
      setTimeout(() => { btn.className = ''; }, 2000);
    }
  }
</script>
</body>
</html>
